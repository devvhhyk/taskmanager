<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>BoardList</title>
    <link rel="stylesheet" href="/css/board.css">
</head>
<body>
<div class="container">
    <table>
        <thead>
        <tr>
            <th>글번호</th>
            <th>제목</th>
            <th>날짜</th>
            <th>조회수</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="board: ${boardList.content}">
            <td th:text="${board.id}"></td>
            <td><a th:href="@{|/board/${board.id}|(page=${boardList.number + 1})}" th:text="${board.boardTitle}"></a></td>
            <td th:text="*{#temporals.format(board.boardCreatedTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
            <td th:text="${board.boardHits}"></td>
        </tr>
        </tbody>
    </table>

    <!-- 첫번째 페이지로 이동 -->
    <!-- /board?page=1 -->
    <a th:href="@{/board(page=1)}">First</a>
    <!-- 이전 링크 활성화 비활성화 -->
    <a th:href="${boardList.first} ? '#' : @{/board(page=${boardList.number})}">prev</a>


    <!-- 페이지 번호 링크 (현재 페이지는 숫자만) -->
    <span th:each="page: ${#numbers.sequence(startPage, endPage)}">
    <!-- 현재 페이지는 링크 없이 숫자만 -->
    <span th:if="${page == boardList.number + 1}" th:text="${page}"></span>
        <!-- 현재 페이지 번호가 아닌 다른 페이지 번호에는 링크를 보여줌 -->
    <span th:unless="${page == boardList.number + 1}">
        <a th:href="@{/board?page={page}(page=${page})}" th:text="${page}"></a>
    </span>
</span>



    <!-- 다음 링크 활성화 비활성화-->
    <a th:href="${boardList.last} ? '#' : @{/board(page=${boardList.number + 2})}">next</a>
    <!-- 마지막 페이지로 이동 -->
    <a th:href="@{/board(page=${boardList.totalPages})}">Last</a>

    <div class="button-container">
        <button onclick="saveBoard()" class="button">글작성</button>
        <a href="/" class="button">홈으로</a>
    </div>
</div>
<script src="/js/board.js/"></script>
</body>
</html>
